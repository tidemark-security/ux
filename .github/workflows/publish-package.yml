name: Publish UX Package

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@tidemark-security'

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const releaseTag = process.env.RELEASE_TAG;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = packageJson.version;
          const versionPattern = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/;

          if (!versionPattern.test(version)) {
            console.error(`package.json version is not valid semver: ${version}`);
            process.exit(1);
          }

          const expectedTag = `v${version}`;
          if (releaseTag !== expectedTag) {
            console.error(`Git tag ${releaseTag} does not match package.json version ${expectedTag}`);
            process.exit(1);
          }

          const prerelease = version.match(/-(.+?)(?:\+|$)/)?.[1];
          const distTag = prerelease ? prerelease.split('.')[0] : 'latest';

          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `NPM_DIST_TAG=${distTag}\n`);
          EOF

      - name: Type check
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Validate publish contents
        run: npm pack --dry-run

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --tag "$NPM_DIST_TAG"